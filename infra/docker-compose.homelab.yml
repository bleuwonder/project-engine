# ============================================================
# docker-compose.homelab.yml — Homelab / Traefik overlay
#
# Usage (replaces override.yml — do NOT load both):
#   docker compose -f docker-compose.yml -f docker-compose.homelab.yml up -d
#
# All services route via the tailnet subdomain pattern:
#   {service}.{INTERNAL_SUBDOMAIN}.{DOMAIN}
#   e.g. langfuse.mw.bluewonder.org
#
# Prerequisites:
#   - Traefik running with cf-dns wildcard cert for *.{INTERNAL_SUBDOMAIN}.{DOMAIN}
#   - External `proxy` network: docker network create proxy
#   - Set TAILSCALE_IP, INTERNAL_SUBDOMAIN, DOMAIN in .env
# ============================================================

networks:
  factory-net:
    driver: bridge
  proxy:
    external: true

services:

  temporal:
    networks:
      - factory-net
    ports:
      # Temporal gRPC — Tailscale-only, for workers running outside Docker
      - "${TAILSCALE_IP}:7233:7233"

  temporal-ui:
    networks:
      - factory-net
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.temporal-ui.rule=Host(`temporal.${INTERNAL_SUBDOMAIN}.${DOMAIN}`)"
      - "traefik.http.routers.temporal-ui.entrypoints=websecure"
      - "traefik.http.routers.temporal-ui.tls=true"
      - "traefik.http.services.temporal-ui.loadbalancer.server.port=8080"

  litellm:
    networks:
      - factory-net
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.litellm.rule=Host(`litellm.${INTERNAL_SUBDOMAIN}.${DOMAIN}`)"
      - "traefik.http.routers.litellm.entrypoints=websecure"
      - "traefik.http.routers.litellm.tls=true"
      - "traefik.http.services.litellm.loadbalancer.server.port=4000"

  langfuse-web:
    networks:
      - factory-net
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.langfuse.rule=Host(`langfuse.${INTERNAL_SUBDOMAIN}.${DOMAIN}`)"
      - "traefik.http.routers.langfuse.entrypoints=websecure"
      - "traefik.http.routers.langfuse.tls=true"
      - "traefik.http.services.langfuse.loadbalancer.server.port=3000"
    environment:
      NEXTAUTH_URL: https://langfuse.${INTERNAL_SUBDOMAIN}.${DOMAIN}

  minio:
    networks:
      - factory-net
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.minio-console.rule=Host(`minio.${INTERNAL_SUBDOMAIN}.${DOMAIN}`)"
      - "traefik.http.routers.minio-console.entrypoints=websecure"
      - "traefik.http.routers.minio-console.tls=true"
      - "traefik.http.routers.minio-console.service=minio-console-svc"
      - "traefik.http.services.minio-console-svc.loadbalancer.server.port=9090"

  dashboard:
    networks:
      - factory-net
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.factory-dashboard.rule=Host(`factory.${INTERNAL_SUBDOMAIN}.${DOMAIN}`)"
      - "traefik.http.routers.factory-dashboard.entrypoints=websecure"
      - "traefik.http.routers.factory-dashboard.tls=true"
      - "traefik.http.services.factory-dashboard.loadbalancer.server.port=3100"
    environment:
      NEXT_PUBLIC_BASE_URL: https://factory.${INTERNAL_SUBDOMAIN}.${DOMAIN}
