# ============================================================
# project-engine/infra/docker-compose.yml
# AI Build Factory — Core Infrastructure
#
# Services:
#   postgres          – PostgreSQL 17 + pgvector 0.8.2
#   temporal-setup    – One-shot: creates temporal schemas (admin-tools 1.30.1)
#   temporal          – Temporal Server 1.30.1
#   temporal-ui       – Temporal UI 2.34.0
#   litellm           – LiteLLM Proxy 1.82.0
#   clickhouse        – ClickHouse 25.8 LTS (Langfuse analytics)
#   redis             – Redis 7.2 (Langfuse queue/cache)
#   minio             – MinIO Oct-2025 (Langfuse blob storage)
#   minio-init        – One-shot: creates langfuse bucket
#   langfuse-web      – Langfuse 3.159.0 web + API
#   langfuse-worker   – Langfuse 3.159.0 async event processor
#
# Version pinning rationale:
#   pgvector 0.8.2-pg17        PG17 current LTS; 0.8.2 fixes CVE-2026-3172 buffer overflow
#   temporal 1.30.1            1.30.x: auto-setup removed, server+admin-tools pattern required
#   temporal-ui 2.34.0         Tested with 1.30.1 (official samples-server pairing)
#   litellm main-v1.82.0-stable  Weekly stable cycle; pinned tag format: main-v{version}-stable
#   langfuse 3.159.0           v3 required (v2 EOL); web and worker tags MUST match
#   clickhouse 25.8            LTS channel (Aug 2025); Langfuse-tested
#   redis 7.2-alpine           Langfuse-tested branch; alpine reduces attack surface
#   minio RELEASE-pinned       Never run minio:latest — breaking changes ship in patch releases
#
# Networking:
#   factory-net is an internal bridge. NO ports are published by default.
#   All inter-service communication uses container names as DNS.
#   Access patterns:
#     Standalone:    docker-compose.override.yml  (auto-loaded, binds localhost ports)
#     Homelab:       docker-compose.homelab.yml   (Traefik labels + proxy network)
#   Override selection:
#     Standalone:  docker compose up -d                          (override.yml auto-loaded)
#     Homelab:     docker compose -f docker-compose.yml -f docker-compose.homelab.yml up -d
#
# Postgres databases:
#   factory              – project-engine data + pgvector embeddings
#   langfuse             – Langfuse transactional data
#   litellm              – LiteLLM usage logs
#   temporal             – Temporal workflow persistence         (created by temporal-setup)
#   temporal_visibility  – Temporal search/visibility index     (created by temporal-setup)
# ============================================================

networks:
  factory-net:
    driver: bridge

volumes:
  postgres-data:
  clickhouse-data:
  clickhouse-logs:
  redis-data:
  minio-data:

services:

  # ── PostgreSQL 17 + pgvector 0.8.2 ─────────────────────────
  # Single instance, five databases (see above).
  # init.sql creates factory/langfuse/litellm; temporal-setup creates temporal dbs.
  # CRITICAL: TZ=UTC required. Langfuse ClickHouse queries and pgvector HNSW both
  # produce wrong results with non-UTC Postgres.
  postgres:
    image: pgvector/pgvector:0.8.2-pg17
    container_name: factory-postgres
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      TZ: UTC
      PGTZ: UTC
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - factory-net

  # ── Temporal Schema Setup ───────────────────────────────────
  # One-shot container using admin-tools image (has temporal-sql-tool + temporal CLI).
  # Creates temporal and temporal_visibility databases, then applies versioned schema.
  # Idempotent: safe to run on every `docker compose up`. If schema is current, exits 0.
  # temporalio/auto-setup was removed in 1.30.x — this replaces it.
  temporal-setup:
    image: temporalio/admin-tools:1.30.1
    container_name: factory-temporal-setup
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_SEEDS: postgres
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PWD: ${POSTGRES_PASSWORD}
    volumes:
      - ./temporal/setup.sh:/setup.sh:ro
    entrypoint: ["/bin/sh", "/setup.sh"]
    networks:
      - factory-net

  # ── Temporal Server 1.30.1 ──────────────────────────────────
  # Runs all 4 roles (frontend, history, matching, worker) in one process.
  # Config loaded from /etc/temporal/config/development.yaml (sprig-templated).
  # Env vars used in config template: POSTGRES_SEEDS, DB_PORT, POSTGRES_USER, POSTGRES_PWD.
  # Healthcheck: nc -z (TCP connect) — nc is available in the debian-slim base image
  # per official temporalio/samples-server recommendation.
  # Upgrade path: 1.30.1 → 1.30.x → 1.31.x sequential minor bumps.
  # Schema migrations run automatically by temporal-setup before server starts.
  temporal:
    image: temporalio/server:1.30.1
    container_name: factory-temporal
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      temporal-setup:
        condition: service_completed_successfully
    environment:
      DB: postgres12
      POSTGRES_SEEDS: postgres
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PWD: ${POSTGRES_PASSWORD}
    volumes:
      - ./temporal/dynamicconfig/development-sql.yaml:/etc/temporal/config/dynamicconfig/docker.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "nc -z $(hostname -i) 7233"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - factory-net

  # ── Temporal UI 2.34.0 ──────────────────────────────────────
  temporal-ui:
    image: temporalio/ui:2.34.0
    container_name: factory-temporal-ui
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: ${TEMPORAL_CORS_ORIGINS:-http://localhost:8080}
      TEMPORAL_PERMIT_WRITE_API: "true"
    networks:
      - factory-net

  # ── LiteLLM Proxy 1.82.0 ────────────────────────────────────
  # LLM gateway: model routing, cost tracking, semantic caching.
  # LANGFUSE_PUBLIC_KEY / SECRET_KEY: create in Langfuse UI after first login.
  #   Settings → Projects → API Keys → Create → add to .env → restart litellm.
  # STORE_MODEL_IN_DB: allows adding models via UI without config file changes.
  litellm:
    image: ghcr.io/berriai/litellm:main-v1.82.0-stable
    container_name: factory-litellm
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/litellm
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: http://langfuse-web:3000
      STORE_MODEL_IN_DB: "true"
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,sys; r=urllib.request.urlopen('http://localhost:4000/health/liveliness'); sys.exit(0 if r.status==200 else 1)\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - factory-net

  # ── ClickHouse 25.8 LTS ─────────────────────────────────────
  # Langfuse v3 stores all traces/observations/scores here (moved from Postgres for scale).
  # LTS release channel: upgrade LTS-to-LTS only (24.3 → 24.8 → 25.3 → 25.8).
  # CRITICAL: TZ=UTC. Non-UTC produces incorrect/empty Langfuse query results.
  clickhouse:
    image: clickhouse/clickhouse-server:25.8
    container_name: factory-clickhouse
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      CLICKHOUSE_DB: langfuse
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clickhouse}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      TZ: UTC
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - factory-net

  # ── Redis 7.2 ───────────────────────────────────────────────
  # Langfuse: async event queue + rate-limit cache.
  # LiteLLM: semantic caching (see litellm-config.yaml).
  redis:
    image: redis:7.2-alpine
    container_name: factory-redis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --save 60 1
      --loglevel warning
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $REDIS_PASSWORD ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - factory-net

  # ── MinIO ───────────────────────────────────────────────────
  # S3-compatible blob storage for Langfuse raw event uploads and attachments.
  # API on internal port 9000 only. Console only exposed via overrides.
  # NEVER use minio:latest — breaking changes ship in patch releases.
  # Update: bump both minio + mc tags together. Check: https://github.com/minio/minio/releases
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: factory-minio
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    command: server /data --address ":9000" --console-address ":9090"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - factory-net

  # ── MinIO init ──────────────────────────────────────────────
  # One-shot: creates the langfuse bucket. mc mb --ignore-existing is idempotent.
  minio-init:
    image: minio/mc:latest
    container_name: factory-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/langfuse &&
      echo 'MinIO: langfuse bucket ready.'
      "
    networks:
      - factory-net

  # ── Langfuse Web 3.159.0 ────────────────────────────────────
  # LLM observability: traces, prompts, evaluations, costs.
  # v3 requires: ClickHouse (analytics) + Redis (queue) + MinIO (blobs) + Postgres (transactional).
  # LANGFUSE_INIT_* seeds org/project/user on first run (idempotent).
  # ENCRYPTION_KEY encrypts stored API keys at rest — back this up, loss = lost API keys.
  langfuse-web:
    image: langfuse/langfuse:3.159.0
    container_name: factory-langfuse-web
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/langfuse
      DIRECT_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/langfuse
      NEXTAUTH_URL: ${LANGFUSE_NEXTAUTH_URL:-http://localhost:3001}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      SALT: ${LANGFUSE_SALT}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY}
      CLICKHOUSE_MIGRATION_URL: clickhouse://${CLICKHOUSE_USER:-clickhouse}:${CLICKHOUSE_PASSWORD}@clickhouse:9000
      CLICKHOUSE_URL: http://${CLICKHOUSE_USER:-clickhouse}:${CLICKHOUSE_PASSWORD}@clickhouse:8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clickhouse}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      REDIS_CONNECTION_STRING: redis://:${REDIS_PASSWORD}@redis:6379
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      LANGFUSE_INIT_ORG_ID: ${LANGFUSE_INIT_ORG_ID:-factory-org}
      LANGFUSE_INIT_ORG_NAME: ${LANGFUSE_INIT_ORG_NAME:-Factory}
      LANGFUSE_INIT_PROJECT_ID: ${LANGFUSE_INIT_PROJECT_ID:-project-engine}
      LANGFUSE_INIT_PROJECT_NAME: ${LANGFUSE_INIT_PROJECT_NAME:-project-engine}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL}
      LANGFUSE_INIT_USER_NAME: ${LANGFUSE_INIT_USER_NAME:-admin}
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/public/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - factory-net

  # ── Langfuse Worker 3.159.0 ─────────────────────────────────
  # Separate image. Processes async tasks: trace ingestion, scoring, dataset runs.
  # Tag MUST match langfuse-web — shared schema version.
  langfuse-worker:
    image: langfuse/langfuse-worker:3.159.0
    container_name: factory-langfuse-worker
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/langfuse
      DIRECT_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/langfuse
      SALT: ${LANGFUSE_SALT}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY}
      CLICKHOUSE_MIGRATION_URL: clickhouse://${CLICKHOUSE_USER:-clickhouse}:${CLICKHOUSE_PASSWORD}@clickhouse:9000
      CLICKHOUSE_URL: http://${CLICKHOUSE_USER:-clickhouse}:${CLICKHOUSE_PASSWORD}@clickhouse:8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clickhouse}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      REDIS_CONNECTION_STRING: redis://:${REDIS_PASSWORD}@redis:6379
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      CLICKHOUSE_CLUSTER_ENABLED: "false"
    networks:
      - factory-net
