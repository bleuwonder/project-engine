# ============================================================
# project-engine/infra/docker-compose.yml
# AI Build Factory — Core Infrastructure
#
# Services:
#   postgres          – PostgreSQL 17 + pgvector 0.8.2
#   temporal          – Temporal Server 1.29.4
#   temporal-ui       – Temporal UI 2.47.3
#   litellm           – LiteLLM Proxy 1.82.0
#   clickhouse        – ClickHouse 25.8 (Langfuse analytics)
#   redis             – Redis 7.2 (Langfuse queue/cache)
#   minio             – MinIO Oct-2025 (Langfuse blob storage)
#   minio-init        – One-shot: creates langfuse bucket
#   langfuse-web      – Langfuse 3.159.0 web + API
#   langfuse-worker   – Langfuse 3.159.0 async event processor
#
# Version pinning rationale:
#   pgvector 0.8.2-pg17   PG17 is current LTS; 0.8.2 fixes CVE-2026-3172 buffer overflow
#   temporal 1.29.4       1.30.0 removed bash/curl — breaks health checks; upgrade sequentially
#   temporal-ui 2.47.3    Pinned to match temporal server release window
#   litellm 1.82.0        Weekly stable cycle; -stable suffix = 3-day prod validation gate
#   langfuse 3.159.0      v3 is current (v2 EOL); web and worker tags MUST match
#   clickhouse 25.8       LTS channel (Aug 2025 LTS); Langfuse-tested
#   redis 7.2-alpine      Langfuse-tested minor branch; alpine reduces attack surface
#   minio RELEASE-pinned  Never run minio:latest — breaking changes ship in patch releases
#
# Networks:
#   factory-net  – internal bridge; no external networks declared here
#   Traefik labels and proxy network added via homelab compose override
#
# Port bindings:
#   All bound to ${BIND_HOST:-127.0.0.1} — localhost-only by default.
#   Set BIND_HOST=<TS_IP> in .env for Tailscale-direct access.
#   Use homelab override for Traefik ingress.
#
# Postgres databases (single instance, three databases):
#   factory     – project-engine data + pgvector embeddings
#   langfuse    – Langfuse transactional data (users, projects, API keys)
#   litellm     – LiteLLM usage logs
#   (temporal + temporal_visibility created by auto-setup on first run)
#
# Startup order:
#   postgres    → temporal, langfuse-web, langfuse-worker, litellm
#   clickhouse  → langfuse-web, langfuse-worker
#   redis       → langfuse-web, langfuse-worker
#   minio       → minio-init → langfuse-web, langfuse-worker
#   temporal    → temporal-ui
# ============================================================

networks:
  factory-net:
    driver: bridge

volumes:
  postgres-data:
  clickhouse-data:
  clickhouse-logs:
  redis-data:
  minio-data:

services:

  # ── PostgreSQL 17 + pgvector 0.8.2 ─────────────────────────
  # Hosts factory, langfuse, and litellm databases.
  # Temporal auto-setup creates temporal + temporal_visibility on first run.
  # Init script (postgres/init.sql) creates the remaining databases and
  # enables the vector extension on the factory database.
  # CRITICAL: Must run UTC. Langfuse and pgvector HNSW indexing both require it.
  postgres:
    image: pgvector/pgvector:0.8.2-pg17
    container_name: factory-postgres
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      TZ: UTC
      PGTZ: UTC
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${BIND_HOST:-127.0.0.1}:${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - factory-net

  # ── Temporal Server 1.29.4 ──────────────────────────────────
  # auto-setup: bootstraps schema on first run, then runs as server.
  # DB: postgresql12 is required for PG12+ (explicit schema vs $user search path).
  # Upgrade path: sequential minor bumps only. See upgrade notes:
  #   https://docs.temporal.io/self-hosted-guide/upgrade-server
  # 1.30.0 breaking change: removed bash/curl from image — healthcheck rework needed.
  # Do not skip to 1.30.x without testing health probes first.
  temporal:
    image: temporalio/auto-setup:1.29.4
    container_name: factory-temporal
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgresql12
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PWD: ${POSTGRES_PASSWORD}
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    ports:
      - "${BIND_HOST:-127.0.0.1}:7233:7233"
    volumes:
      - ./temporal/dynamicconfig:/etc/temporal/config/dynamicconfig:ro
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - factory-net

  # ── Temporal UI 2.47.3 ──────────────────────────────────────
  temporal-ui:
    image: temporalio/ui:2.47.3
    container_name: factory-temporal-ui
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: ${TEMPORAL_CORS_ORIGINS:-http://localhost:8080}
      TEMPORAL_PERMIT_WRITE_API: "true"
    ports:
      - "${BIND_HOST:-127.0.0.1}:8080:8080"
    networks:
      - factory-net

  # ── LiteLLM Proxy 1.82.0 ────────────────────────────────────
  # LLM gateway: model routing, cost tracking, failover, semantic caching.
  # Config: ./litellm-config.yaml (model definitions + Langfuse callback).
  # DATABASE_URL: stores usage logs in litellm db (cost tracking per model/key).
  # LANGFUSE_PUBLIC_KEY / SECRET_KEY: obtained from Langfuse UI after first login.
  #   Create a project in Langfuse, go to Settings → API Keys, add them to .env.
  # Update cadence: weekly stable releases — bump version tag, test, commit.
  litellm:
    image: ghcr.io/berriai/litellm:main-1.82.0-stable
    container_name: factory-litellm
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/litellm
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: http://langfuse-web:3000
      STORE_MODEL_IN_DB: "true"
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    ports:
      - "${BIND_HOST:-127.0.0.1}:4000:4000"
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health/liveliness || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - factory-net

  # ── ClickHouse 25.8 ─────────────────────────────────────────
  # Langfuse v3 moved all trace/observation/score data here.
  # LTS release channel: 24.3, 24.8, 25.3, 25.8 — always upgrade LTS-to-LTS.
  # CRITICAL: Must run UTC. Non-UTC produces incorrect/empty query results.
  clickhouse:
    image: clickhouse/clickhouse-server:25.8
    container_name: factory-clickhouse
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      CLICKHOUSE_DB: langfuse
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clickhouse}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      TZ: UTC
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
    ports:
      - "${BIND_HOST:-127.0.0.1}:8123:8123"
      - "${BIND_HOST:-127.0.0.1}:9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - factory-net

  # ── Redis 7.2 ───────────────────────────────────────────────
  # Langfuse uses Redis for async event queue and rate-limit cache.
  # Password passed via environment so healthcheck can auth without a config file.
  redis:
    image: redis:7.2-alpine
    container_name: factory-redis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --save 60 1
      --loglevel warning
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $REDIS_PASSWORD ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - factory-net

  # ── MinIO ───────────────────────────────────────────────────
  # S3-compatible blob storage for Langfuse raw event uploads and attachments.
  # NEVER use minio:latest — breaking changes ship in patch releases.
  # To update: check https://github.com/minio/minio/releases, bump both
  # minio and mc tags together, test bucket access before promoting.
  # API: port 9000 (internal), Console UI: port 9090
  minio:
    image: minio/minio:RELEASE.2025-10-15T17-29-55Z
    container_name: factory-minio
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    ports:
      - "${BIND_HOST:-127.0.0.1}:9090:9090"
    command: server /data --address ":9000" --console-address ":9090"
    healthcheck:
      test: ["CMD-SHELL", "mc ready local 2>/dev/null || curl -sf http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - factory-net

  # ── MinIO init ──────────────────────────────────────────────
  # One-shot container. Creates the langfuse bucket on first run then exits.
  # Safe to run on every `docker compose up` — mc mb --ignore-existing is idempotent.
  # Uses latest mc client — one-shot, no persistent exposure, acceptable risk.
  minio-init:
    image: minio/mc:latest
    container_name: factory-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/langfuse &&
      echo 'MinIO: langfuse bucket ready.'
      "
    networks:
      - factory-net

  # ── Langfuse Web 3.159.0 ────────────────────────────────────
  # LLM observability: traces, prompts, evaluations, costs.
  # v3 requires ClickHouse (analytics), Redis (queue), MinIO (blobs), Postgres (transactional).
  # LANGFUSE_INIT_* vars seed the first org/project/user on first startup (idempotent).
  #   After first run, create API keys in the UI → add to .env → restart litellm to pick them up.
  # ENCRYPTION_KEY: 64-char hex (openssl rand -hex 32). Encrypts stored API keys at rest.
  # CRITICAL: TZ is inherited from system; Postgres must be UTC (set above).
  langfuse-web:
    image: langfuse/langfuse:3.159.0
    container_name: factory-langfuse-web
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/langfuse
      DIRECT_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/langfuse
      NEXTAUTH_URL: ${LANGFUSE_NEXTAUTH_URL:-http://localhost:3001}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      SALT: ${LANGFUSE_SALT}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY}
      CLICKHOUSE_MIGRATION_URL: clickhouse://${CLICKHOUSE_USER:-clickhouse}:${CLICKHOUSE_PASSWORD}@clickhouse:9000
      CLICKHOUSE_URL: http://${CLICKHOUSE_USER:-clickhouse}:${CLICKHOUSE_PASSWORD}@clickhouse:8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clickhouse}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      REDIS_CONNECTION_STRING: redis://:${REDIS_PASSWORD}@redis:6379
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_INIT_ORG_ID: ${LANGFUSE_INIT_ORG_ID:-factory-org}
      LANGFUSE_INIT_ORG_NAME: ${LANGFUSE_INIT_ORG_NAME:-Factory}
      LANGFUSE_INIT_PROJECT_ID: ${LANGFUSE_INIT_PROJECT_ID:-project-engine}
      LANGFUSE_INIT_PROJECT_NAME: ${LANGFUSE_INIT_PROJECT_NAME:-project-engine}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL}
      LANGFUSE_INIT_USER_NAME: ${LANGFUSE_INIT_USER_NAME:-admin}
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD}
    ports:
      - "${BIND_HOST:-127.0.0.1}:3001:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/public/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - factory-net

  # ── Langfuse Worker 3.159.0 ─────────────────────────────────
  # Separate image from langfuse-web. Processes async tasks: trace ingestion,
  # score calculation, dataset runs, scheduled exports.
  # Tag MUST match langfuse-web — they share the same schema version.
  langfuse-worker:
    image: langfuse/langfuse-worker:3.159.0
    container_name: factory-langfuse-worker
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/langfuse
      DIRECT_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/langfuse
      SALT: ${LANGFUSE_SALT}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY}
      CLICKHOUSE_MIGRATION_URL: clickhouse://${CLICKHOUSE_USER:-clickhouse}:${CLICKHOUSE_PASSWORD}@clickhouse:9000
      CLICKHOUSE_URL: http://${CLICKHOUSE_USER:-clickhouse}:${CLICKHOUSE_PASSWORD}@clickhouse:8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clickhouse}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      REDIS_CONNECTION_STRING: redis://:${REDIS_PASSWORD}@redis:6379
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
    networks:
      - factory-net
