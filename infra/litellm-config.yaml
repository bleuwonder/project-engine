# infra/litellm-config.yaml
# LiteLLM Proxy — model routing, cost tracking, failover.
#
# Model aliases used in workers/src/activities/llm.ts:
#   mistral        → hosted_vllm/Mistral-7B-AWQ     (local GPU — zero cost, direct Docker network)
#   codex          → chatgpt/gpt-5.3-codex        (code gen — ChatGPT subscription, no API cost)
#   gpt-large      → chatgpt/gpt-5.4              (general large — ChatGPT subscription)
#   gpt-small      → chatgpt/gpt-5.3-instant      (fast/cheap — ChatGPT subscription)
#   claude-opus    → anthropic/claude-opus-4-5    (complex tasks — Anthropic API key)
#   claude-sonnet  → anthropic/claude-sonnet-4-5  (balanced — Anthropic API key)
#   claude-haiku   → anthropic/claude-3-5-haiku-20241022  (simple + meta — Anthropic API key)
#
# ChatGPT subscription auth (one-time setup):
#   1. Start the stack: docker compose up -d
#   2. Hit any chatgpt/* model: docker exec factory-litellm litellm --test --model chatgpt/gpt-5.3-codex
#   3. LiteLLM prints a device code + URL in container logs
#   4. Open URL on any device, enter code — token saved to chatgpt-tokens volume
#   5. All subsequent calls use the cached token (auto-refreshes)
#
# Routing logic lives in code (workers/src/activities/llm.ts), not here.
# Langfuse callback: set LANGFUSE_PUBLIC_KEY + LANGFUSE_SECRET_KEY in .env after first login.
#
# Anthropic models: https://docs.anthropic.com/en/docs/models-overview
# OpenAI models:    https://platform.openai.com/docs/models

model_list:

  # ── ChatGPT subscription models (no API key — uses OAuth token) ──────────────
  - model_name: codex
    model_info:
      mode: responses
    litellm_params:
      model: chatgpt/gpt-5.3-codex

  - model_name: gpt-large
    model_info:
      mode: responses
    litellm_params:
      model: chatgpt/gpt-5.4

  - model_name: gpt-small
    model_info:
      mode: responses
    litellm_params:
      model: chatgpt/gpt-5.3-instant

  # ── Local vLLM (Mistral 7B AWQ — no API cost, on-prem GPU) ─────────────────
  - model_name: mistral
    litellm_params:
      model: hosted_vllm/solidrust/Mistral-7B-Instruct-v0.3-AWQ
      api_base: http://vllm:8000/v1
      request_timeout: 120

  # ── Anthropic models (requires ANTHROPIC_API_KEY in .env) ───────────────────
  - model_name: claude-opus
    litellm_params:
      model: anthropic/claude-opus-4-5
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-5
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-haiku
    litellm_params:
      model: anthropic/claude-3-5-haiku-20241022
      api_key: os.environ/ANTHROPIC_API_KEY

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL

  # Semantic caching: returns cached response for semantically similar prompts.
  # Reduces cost on repeated/similar agent calls. Disable if determinism required.
  cache: true
  cache_params:
    type: redis
    redis_connection_string: redis://:os.environ/REDIS_PASSWORD@redis:6379

litellm_settings:
  # Drop unknown params silently rather than erroring (safer across model versions).
  drop_params: true

  # Langfuse observability. Keys set via environment variables.
  # Traces will appear in Langfuse under the project configured in LANGFUSE_INIT_PROJECT_NAME.
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]
  langfuse_public_key: os.environ/LANGFUSE_PUBLIC_KEY
  langfuse_secret_key: os.environ/LANGFUSE_SECRET_KEY
  langfuse_host: http://langfuse-web:3000
